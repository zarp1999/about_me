<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8e2d8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .mongol-page {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      color: #1a1206;
      box-shadow: 0 0 40px rgba(0,0,0,0.18);
    }

    /* 上下の装飾ストライプ（紺・金・赤） */
    .ornament-bar {
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        #1a3a5c 0px,  #1a3a5c 10px,
        #c9a84c 10px, #c9a84c 20px,
        #8b1a1a 20px, #8b1a1a 30px,
        #c9a84c 30px, #c9a84c 40px
      );
    }

    /* 空のヒーローセクション */
    .sky-hero {
      background: linear-gradient(180deg,
        #1a3a5c 0%,
        #2d6a9f 45%,
        #5ba3d0 75%,
        #8bc4e0 100%
      );
      padding: 2rem 1.5rem 0;
      position: relative;
      overflow: hidden;
      min-height: 200px;
    }

    .stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }

    .grassland {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
    }

    /* 名前・アバター エリア */
    .ger-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 3rem;
    }

    .ger-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2.5px solid #c9a84c;
      box-shadow: 0 0 0 4px rgba(201,168,76,0.25), 0 6px 24px rgba(0,0,0,0.4);
      overflow: hidden;
      margin-bottom: 0.75rem;
      background: #fff8e8;
    }

    .ger-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name-mn {
      font-family: 'Noto Serif JP', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: #fff8e8;
      margin-bottom: 4px;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .name-sub {
      font-size: 10px;
      letter-spacing: 0.24em;
      color: #a8d4f0;
      text-transform: uppercase;
      text-align: center;
    }

    /* コンテンツエリア */
    .content-area {
      background: #fdf8ee;
      border-left: 1px solid #d4b86a;
      border-right: 1px solid #d4b86a;
      padding: 1.5rem;
    }

    /* 区切り線 */
    .divider-mn {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0.5rem 0 1.5rem;
    }

    .divider-mn-line {
      flex: 1;
      height: 0.5px;
      background: #c9a84c;
      opacity: 0.4;
    }

    .divider-mn-sym {
      font-size: 16px;
      color: #c9a84c;
      opacity: 0.7;
    }

    /* 自己紹介文 */
    .bio {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      line-height: 1.8;
      color: #3a2810;
      text-align: center;
      margin-bottom: 1.75rem;
      letter-spacing: 0.08em;
    }

    /* セクションラベル */
    .section-label {
      font-size: 9px;
      letter-spacing: 0.28em;
      color: #8b6a30;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    /* リンクボタン */
    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border: 0.5px solid #d4b86a;
      border-radius: 6px;
      background: #fff8e8;
      color: #1a1206;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .link-btn:hover { background: #f5ead0; }

    .link-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 0.5px solid #d4b86a;
      background: #fdf8ee;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a3a5c;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 16px;
      height: 16px;
    }

    .link-label { flex: 1; color: #1a1206; }

    .link-handle {
      font-size: 11px;
      color: #8b6a30;
      word-break: break-all;
    }

    /* フッター */
    .footer-strip {
      background: #1a3a5c;
      padding: 0.6rem 1.5rem;
      text-align: center;
      border-left: 1px solid #d4b86a;
      border-right: 1px solid #d4b86a;
      border-bottom: 1px solid #d4b86a;
    }

    .footer-strip p {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #a8d4f0;
      font-family: 'Noto Serif JP', serif;
    }
  </style>
</head>
<body>
<div class="mongol-page">

  <div class="ornament-bar" aria-hidden="true"></div>

  <div class="sky-hero">
    <!-- 星 -->
    <svg class="stars" viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <circle cx="200" cy="8"  r="0.7" fill="white" opacity="0.7"/>

    <!-- 大草原とゲル -->
    <svg class="grassland" viewBox="0 0 420 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0 40 Q50 20 100 35 Q150 50 200 30 Q250 15 300 35 Q350 50 420 25 L420 60 L0 60 Z" fill="#2d5a1b" opacity="0.9"/>
      <path d="M0 50 Q80 35 160 48 Q240 58 320 40 Q370 30 420 45 L420 60 L0 60 Z" fill="#3a7a25"/>
      <!-- ゲル（ゲル）シルエット -->
      <ellipse cx="180" cy="42" rx="18" ry="10" fill="#fff8e8" opacity="0.9"/>
      <rect x="171" y="35" width="18" height="10" fill="#fff8e8" opacity="0.8"/>
      <path d="M169 36 L180 24 L191 36 Z" fill="#fff8e8" opacity="0.9"/>
      <rect x="178" y="38" width="4"  height="7" fill="#c4956a" opacity="0.6"/>
    </svg>

    <div class="ger-wrap">
      <div class="ger-avatar">
        <img src="719126328_27354057824280487_2114773321052504188_n.jpg" alt="Daria"/>
      </div>
      <p class="name-mn">Daria</p>
    </div>
  </div>

  <div class="content-area">
    <div class="divider-mn" aria-hidden="true">
      <div class="divider-mn-line"></div>
      <span class="divider-mn-sym">✦</span>
      <div class="divider-mn-line"></div>
    </div>

    <p class="bio">モンゴル製、日本で稼働中。</p>

    <p class="section-label">Connect with me</p>

    <div class="links">

      <!-- Instagram -->
      <a class="link-btn" href="https://www.instagram.com/d_a__r_ia/" target="_blank" rel="noopener">
        <span class="link-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="4"/>
            <circle cx="12" cy="12" r="3"/>
            <line x1="16.5" y1="7.5" x2="16.5" y2="7.501"/>
          </svg>
        </span>
        <span class="link-label">Instagram</span>
        <span class="link-handle">@d_a__r_ia</span>
      </a>

      <!-- Facebook -->
      <a class="link-btn" href="https://www.facebook.com/profile.php?id=100013280554250" target="_blank" rel="noopener">
        <span class="link-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 10v4h3v7h4v-7h3l1-4h-4v-2a1 1 0 0 1 1-1h3v-4h-3a5 5 0 0 0-5 5v2h-3"/>
          </svg>
        </span>
        <span class="link-label">Facebook</span>
        <span class="link-handle">Daria</span>
      </a>

      <!-- メール -->
      <a class="link-btn" href="mailto:zarp.191@gmail.com">
        <span class="link-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <polyline points="3 7 12 13 21 7"/>
          </svg>
        </span>
        <span class="link-label">メール</span>
        <span class="link-handle">zarp.191@gmail.com</span>
      </a>

    </div>
  </div>

  <div class="ornament-bar" aria-hidden="true"></div>

  <div class="footer-strip">
    <p>© 2026 Daribazar Munkhbat</p>
  </div>

</div>
</body>
</html>
