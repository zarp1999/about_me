<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daria</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5e6ff 0%, #fce4ec 50%, #e8f4fd 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .avatar-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #fff;
      box-shadow: 0 8px 32px rgba(180, 120, 220, 0.25), 0 2px 8px rgba(0,0,0,0.08);
      display: block;
    }

    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      z-index: -1;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #2d2d2d;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    .links {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 16px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      position: relative;
      overflow: hidden;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .link-btn:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    .link-btn svg {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
    }

    .link-btn span {
      flex: 1;
      text-align: center;
      padding-right: 22px; /* visually center text alongside icon */
    }

    /* Instagram */
    .instagram {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }

    /* Facebook */
    .facebook {
      background: #1877F2;
    }

    /* LINE */
    .line {
      background: #06C755;
    }

    footer {
      margin-top: 36px;
      font-size: 0.75rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar-wrapper">
      <div class="avatar-ring"></div>
      <img
        src="719126328_27354057824280487_2114773321052504188_n.jpg"
        alt="Daria"
        class="avatar"
      />
    </div>

    <h1>Daria</h1>

    <div class="links">

      <!-- Instagram -->

</body>
</html>
